version: '3.8'

services:
  libraryit-server:
    build: .
    container_name: libraryit-server
    hostname: libraryit-server

    ports:
      - "1445:445"

    volumes:
      - ./data/ebooks:/libraryit/ebooks
      - ./data/papers:/libraryit/papers
      - ./data/docs:/libraryit/docs
      - ./data/sourcecode:/libraryit/sourcecode
      - ./logs:/logs

    restart: always

  libraryit-logger:
    image: alpine:latest
    container_name: libraryit-logger

    command: sh /logger/logger.sh

    volumes:
      - ./logs:/logs
      - ./logger:/logger

    depends_on:
      - libraryit-server

    restart: always
